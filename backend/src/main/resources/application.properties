server.port=8080

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/chatbot_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

app.jwt.secret=${JWT_SECRET:companion-secret-key-change-in-production-must-be-long}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

management.endpoints.web.exposure.include=health,info
