spring.application.name=elderly-companion-chatbot
server.port=8080

# Frontend integration (Vite/React/Vue dev servers)
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Embedded database for local development
spring.datasource.url=jdbc:h2:file:./data/chatbotdb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Actuator for runtime health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
