<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Companion — Your AI Friend</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.3.4/vue.global.prod.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f0e8;
      --surface: #fffdf8;
      --surface2: #f0ebe0;
      --border: #e0d8c8;
      --text: #2c2416;
      --text-muted: #8a7d68;
      --accent: #b85c38;
      --accent2: #5c8a6b;
      --accent-light: #f0e0d8;
      --bot-bubble: #ffffff;
      --user-bubble: #b85c38;
      --user-text: #ffffff;
      --shadow: 0 2px 16px rgba(44,36,22,0.08);
      --shadow-lg: 0 8px 40px rgba(44,36,22,0.14);
      --radius: 18px;
      --transition: 0.28s cubic-bezier(0.4,0,0.2,1);
    }

    [data-theme="dark"] {
      --bg: #1a1610;
      --surface: #241f18;
      --surface2: #2e2720;
      --border: #3a3228;
      --text: #f0e8d8;
      --text-muted: #8a7d68;
      --accent: #d4784e;
      --accent2: #6aab7e;
      --accent-light: #3a2418;
      --bot-bubble: #2e2720;
      --user-bubble: #d4784e;
      --user-text: #fff8f0;
      --shadow: 0 2px 16px rgba(0,0,0,0.3);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.4);
    }

    html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); transition: background var(--transition), color var(--transition); }

    /* ── LAYOUT ── */
    #app { display: flex; height: 100vh; overflow: hidden; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 280px; min-width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      transition: transform var(--transition), background var(--transition);
      z-index: 20;
    }
    .sidebar-header {
      padding: 28px 24px 20px;
      border-bottom: 1px solid var(--border);
    }
    .logo { font-family: 'Lora', serif; font-size: 22px; font-weight: 600; color: var(--accent); letter-spacing: -0.3px; }
    .logo span { font-style: italic; font-weight: 400; }
    .tagline { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

    .sidebar-nav { padding: 16px 12px; flex: 1; overflow-y: auto; }
    .nav-section-label { font-size: 10px; font-weight: 500; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-muted); padding: 8px 12px 6px; }
    .nav-btn {
      width: 100%; display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; border-radius: 12px; border: none; background: none;
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
      cursor: pointer; transition: background var(--transition), color var(--transition);
      text-align: left;
    }
    .nav-btn:hover { background: var(--surface2); }
    .nav-btn.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }
    .nav-btn .icon { font-size: 18px; width: 22px; text-align: center; flex-shrink: 0; }
    .nav-btn .badge { margin-left: auto; background: var(--accent); color: white; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px; }

    .sidebar-footer { padding: 16px 12px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 6px; }
    .theme-toggle {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-radius: 12px; border: none;
      background: none; color: var(--text-muted); font-family: 'DM Sans', sans-serif;
      font-size: 13px; cursor: pointer; width: 100%; transition: background var(--transition);
    }
    .theme-toggle:hover { background: var(--surface2); }
    .toggle-track {
      margin-left: auto; width: 38px; height: 20px; background: var(--border);
      border-radius: 10px; position: relative; transition: background var(--transition);
    }
    .toggle-track.on { background: var(--accent); }
    .toggle-thumb {
      position: absolute; top: 3px; left: 3px; width: 14px; height: 14px;
      background: white; border-radius: 50%; transition: transform var(--transition);
    }
    .toggle-track.on .toggle-thumb { transform: translateX(18px); }

    /* ── MAIN AREA ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

    /* ── TOP BAR ── */
    .topbar {
      padding: 16px 24px; border-bottom: 1px solid var(--border);
      background: var(--surface); display: flex; align-items: center; gap: 14px;
      transition: background var(--transition);
    }
    .hamburger { display: none; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text); }
    .topbar-title { font-family: 'Lora', serif; font-size: 18px; font-weight: 600; }
    .topbar-subtitle { font-size: 12px; color: var(--text-muted); }
    .topbar-actions { margin-left: auto; display: flex; gap: 8px; }
    .icon-btn {
      background: none; border: 1px solid var(--border); border-radius: 10px;
      padding: 7px 10px; font-size: 16px; cursor: pointer; color: var(--text);
      transition: background var(--transition), border-color var(--transition);
    }
    .icon-btn:hover { background: var(--surface2); }

    /* ── AUTH SCREEN ── */
    .auth-screen {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 24px; background: var(--bg);
    }
    .auth-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 24px;
      padding: 44px 40px; width: 100%; max-width: 420px;
      box-shadow: var(--shadow-lg); animation: slideUp 0.4s ease;
    }
    @keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
    .auth-logo { font-family: 'Lora', serif; font-size: 28px; font-weight: 600; color: var(--accent); margin-bottom: 6px; }
    .auth-logo em { font-style: italic; font-weight: 400; }
    .auth-tagline { color: var(--text-muted); font-size: 14px; margin-bottom: 32px; }
    .auth-tabs { display: flex; gap: 4px; background: var(--surface2); padding: 4px; border-radius: 12px; margin-bottom: 28px; }
    .auth-tab {
      flex: 1; padding: 9px; border-radius: 9px; border: none; background: none;
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
      cursor: pointer; color: var(--text-muted); transition: all var(--transition);
    }
    .auth-tab.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
    .form-input {
      width: 100%; padding: 12px 16px; border-radius: 12px;
      border: 1.5px solid var(--border); background: var(--bg);
      font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text);
      transition: border-color var(--transition), background var(--transition);
      outline: none;
    }
    .form-input:focus { border-color: var(--accent); background: var(--surface); }
    .form-input::placeholder { color: var(--text-muted); }
    .auth-btn {
      width: 100%; padding: 13px; border-radius: 12px; border: none;
      background: var(--accent); color: white; font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 8px;
      transition: opacity var(--transition), transform var(--transition);
    }
    .auth-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .auth-btn:active { transform: translateY(0); }
    .auth-error { color: #c0392b; font-size: 13px; margin-top: 10px; text-align: center; }

    /* ── CHAT VIEW ── */
    .chat-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .messages {
      flex: 1; overflow-y: auto; padding: 24px 24px 12px;
      display: flex; flex-direction: column; gap: 16px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    .message-row { display: flex; gap: 10px; animation: msgIn 0.3s ease; }
    @keyframes msgIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
    .message-row.user { flex-direction: row-reverse; }
    .avatar {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; background: var(--surface2); border: 1px solid var(--border);
    }
    .message-row.user .avatar { background: var(--accent-light); }

    .bubble-wrap { display: flex; flex-direction: column; gap: 4px; max-width: 70%; }
    .message-row.user .bubble-wrap { align-items: flex-end; }

    .bubble {
      padding: 12px 16px; border-radius: 18px; font-size: 14.5px; line-height: 1.6;
      background: var(--bot-bubble); color: var(--text); border: 1px solid var(--border);
      border-bottom-left-radius: 4px; box-shadow: var(--shadow);
    }
    .message-row.user .bubble {
      background: var(--user-bubble); color: var(--user-text);
      border: none; border-bottom-right-radius: 4px; border-bottom-left-radius: 18px;
    }
    .bubble-time { font-size: 11px; color: var(--text-muted); padding: 0 4px; }

    /* Typing indicator */
    .typing-bubble { padding: 14px 18px; }
    .typing-dots { display: flex; gap: 5px; align-items: center; }
    .dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted);
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform: scale(0.7); opacity:0.5; } 40% { transform: scale(1); opacity:1; } }

    /* Empty state */
    .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 40px; text-align: center; }
    .empty-emoji { font-size: 48px; }
    .empty-title { font-family: 'Lora', serif; font-size: 22px; color: var(--text); }
    .empty-sub { color: var(--text-muted); font-size: 14px; max-width: 300px; line-height: 1.6; }
    .quick-prompts { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 16px; }
    .quick-pill {
      padding: 9px 16px; border-radius: 20px; border: 1.5px solid var(--border);
      background: var(--surface); font-size: 13px; color: var(--text);
      cursor: pointer; transition: all var(--transition); font-family: 'DM Sans', sans-serif;
    }
    .quick-pill:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

    /* Input bar */
    .input-bar {
      padding: 16px 20px; border-top: 1px solid var(--border);
      background: var(--surface); display: flex; gap: 10px; align-items: flex-end;
      transition: background var(--transition);
    }
    .msg-input {
      flex: 1; padding: 12px 16px; border-radius: 14px; border: 1.5px solid var(--border);
      background: var(--bg); font-family: 'DM Sans', sans-serif; font-size: 14px;
      color: var(--text); resize: none; outline: none; max-height: 120px;
      transition: border-color var(--transition), background var(--transition);
      line-height: 1.5;
    }
    .msg-input:focus { border-color: var(--accent); background: var(--surface); }
    .msg-input::placeholder { color: var(--text-muted); }
    .send-btn {
      width: 44px; height: 44px; border-radius: 12px; border: none;
      background: var(--accent); color: white; font-size: 18px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: opacity var(--transition), transform var(--transition); flex-shrink: 0;
    }
    .send-btn:hover:not(:disabled) { opacity: 0.88; transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── REMINDER PANEL ── */
    .reminder-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .reminder-body { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }

    .reminder-add-card {
      background: var(--surface); border: 1.5px dashed var(--border); border-radius: 16px;
      padding: 20px; display: flex; flex-direction: column; gap: 12px;
    }
    .reminder-add-title { font-size: 13px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; }
    .reminder-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .reminder-input {
      flex: 1; min-width: 140px; padding: 10px 14px; border-radius: 10px;
      border: 1.5px solid var(--border); background: var(--bg);
      font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); outline: none;
      transition: border-color var(--transition);
    }
    .reminder-input:focus { border-color: var(--accent); }
    .add-btn {
      padding: 10px 20px; border-radius: 10px; border: none;
      background: var(--accent); color: white; font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap;
      transition: opacity var(--transition);
    }
    .add-btn:hover { opacity: 0.88; }

    .reminder-list { display: flex; flex-direction: column; gap: 10px; }
    .reminder-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      padding: 16px 18px; display: flex; align-items: center; gap: 14px;
      animation: msgIn 0.3s ease; transition: background var(--transition);
    }
    .reminder-card.done { opacity: 0.55; }
    .reminder-check {
      width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border);
      background: none; cursor: pointer; flex-shrink: 0; display: flex; align-items: center;
      justify-content: center; font-size: 12px; transition: all var(--transition);
    }
    .reminder-check.checked { background: var(--accent2); border-color: var(--accent2); color: white; }
    .reminder-info { flex: 1; }
    .reminder-title { font-size: 14px; font-weight: 500; }
    .reminder-card.done .reminder-title { text-decoration: line-through; }
    .reminder-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .reminder-delete {
      background: none; border: none; color: var(--text-muted); font-size: 16px;
      cursor: pointer; padding: 4px; border-radius: 6px; transition: color var(--transition);
    }
    .reminder-delete:hover { color: #c0392b; }
    .reminder-empty { text-align: center; padding: 40px; color: var(--text-muted); font-size: 15px; }

    /* ── MOBILE ── */
    .sidebar-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      z-index: 15; backdrop-filter: blur(2px);
    }

    @media (max-width: 680px) {
      .sidebar {
        position: fixed; left: 0; top: 0; bottom: 0;
        transform: translateX(-100%);
      }
      .sidebar.open { transform: translateX(0); box-shadow: var(--shadow-lg); }
      .sidebar-overlay { display: block; }
      .hamburger { display: flex; }
      .bubble-wrap { max-width: 85%; }
      .auth-card { padding: 32px 24px; }
    }
  </style>
</head>
<body>
<div id="app" :data-theme="darkMode ? 'dark' : 'light'">

  <!-- Auth Screen -->
  <template v-if="!loggedIn">
    <div class="auth-screen">
      <div class="auth-card">
        <div class="auth-logo">Com<em>panion</em></div>
        <div class="auth-tagline">Your warm, always-available AI friend 🌿</div>

        <div class="auth-tabs">
          <button class="auth-tab" :class="{active: authTab==='login'}" @click="authTab='login'">Sign In</button>
          <button class="auth-tab" :class="{active: authTab==='register'}" @click="authTab='register'">Register</button>
        </div>

        <template v-if="authTab==='login'">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" type="email" v-model="loginForm.email" placeholder="you@example.com" @keyup.enter="doLogin" />
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input class="form-input" type="password" v-model="loginForm.password" placeholder="••••••••" @keyup.enter="doLogin" />
          </div>
          <button class="auth-btn" @click="doLogin">Sign In</button>
        </template>

        <template v-else>
          <div class="form-group">
            <label class="form-label">Your Name</label>
            <input class="form-input" type="text" v-model="regForm.name" placeholder="Margaret" @keyup.enter="doRegister" />
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" type="email" v-model="regForm.email" placeholder="you@example.com" @keyup.enter="doRegister" />
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input class="form-input" type="password" v-model="regForm.password" placeholder="••••••••" @keyup.enter="doRegister" />
          </div>
          <button class="auth-btn" @click="doRegister">Create Account</button>
        </template>

        <div class="auth-error" v-if="authError">{{ authError }}</div>
      </div>
    </div>
  </template>

  <!-- Main App -->
  <template v-else>
    <!-- Sidebar overlay (mobile) -->
    <div class="sidebar-overlay" v-if="sidebarOpen" @click="sidebarOpen=false"></div>

    <!-- Sidebar -->
    <aside class="sidebar" :class="{open: sidebarOpen}">
      <div class="sidebar-header">
        <div class="logo">Com<span>panion</span></div>
        <div class="tagline">Hello, {{ userName }} 👋</div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section-label">Menu</div>
        <button class="nav-btn" :class="{active: view==='chat'}" @click="view='chat'; sidebarOpen=false">
          <span class="icon">💬</span> Chat
        </button>
        <button class="nav-btn" :class="{active: view==='reminders'}" @click="view='reminders'; sidebarOpen=false">
          <span class="icon">🔔</span> Reminders
          <span class="badge" v-if="pendingReminders > 0">{{ pendingReminders }}</span>
        </button>
      </nav>
      <div class="sidebar-footer">
        <button class="theme-toggle" @click="darkMode=!darkMode">
          <span>{{ darkMode ? '☀️' : '🌙' }}</span>
          {{ darkMode ? 'Light Mode' : 'Dark Mode' }}
          <div class="toggle-track" :class="{on: darkMode}">
            <div class="toggle-thumb"></div>
          </div>
        </button>
        <button class="nav-btn" @click="doLogout" style="color: var(--text-muted);">
          <span class="icon">🚪</span> Sign Out
        </button>
      </div>
    </aside>

    <!-- Main content -->
    <div class="main">
      <!-- Topbar -->
      <header class="topbar">
        <button class="hamburger" @click="sidebarOpen=!sidebarOpen">☰</button>
        <div>
          <div class="topbar-title">{{ view === 'chat' ? 'Chat' : 'Reminders' }}</div>
          <div class="topbar-subtitle">{{ view === 'chat' ? 'Your companion is here for you' : 'Manage your daily reminders' }}</div>
        </div>
        <div class="topbar-actions">
          <button class="icon-btn" @click="clearChat" v-if="view==='chat'" title="Clear chat">🗑️</button>
        </div>
      </header>

      <!-- CHAT VIEW -->
      <div class="chat-view" v-if="view==='chat'">
        <!-- Empty state -->
        <template v-if="messages.length === 0">
          <div class="empty-state">
            <div class="empty-emoji">🌿</div>
            <div class="empty-title">How are you today?</div>
            <div class="empty-sub">I'm here to chat, listen, and help you with anything on your mind.</div>
            <div class="quick-prompts">
              <button class="quick-pill" v-for="p in quickPrompts" :key="p" @click="sendQuick(p)">{{ p }}</button>
            </div>
          </div>
        </template>

        <!-- Messages -->
        <div class="messages" ref="messagesEl" v-else>
          <div class="message-row" v-for="msg in messages" :key="msg.id" :class="{user: msg.role==='user'}">
            <div class="avatar">{{ msg.role === 'user' ? '🧑' : '🤖' }}</div>
            <div class="bubble-wrap">
              <div class="bubble">{{ msg.content }}</div>
              <div class="bubble-time">{{ msg.time }}</div>
            </div>
          </div>
          <!-- Typing indicator -->
          <div class="message-row" v-if="isTyping">
            <div class="avatar">🤖</div>
            <div class="bubble-wrap">
              <div class="bubble typing-bubble">
                <div class="typing-dots">
                  <div class="dot"></div>
                  <div class="dot"></div>
                  <div class="dot"></div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Input -->
        <div class="input-bar">
          <textarea
            class="msg-input"
            v-model="inputText"
            placeholder="Say something…"
            rows="1"
            @keydown.enter.exact.prevent="sendMessage"
            @input="autoResize"
            ref="inputEl"
          ></textarea>
          <button class="send-btn" @click="sendMessage" :disabled="!inputText.trim() || isTyping">➤</button>
        </div>
      </div>

      <!-- REMINDERS VIEW -->
      <div class="reminder-view" v-if="view==='reminders'">
        <div class="reminder-body">
          <!-- Add Reminder -->
          <div class="reminder-add-card">
            <div class="reminder-add-title">New Reminder</div>
            <div class="reminder-row">
              <input class="reminder-input" v-model="newReminder.title" placeholder="e.g. Take blood pressure medication" @keyup.enter="addReminder" />
              <input class="reminder-input" type="time" v-model="newReminder.time" style="max-width:130px;" />
              <button class="add-btn" @click="addReminder">+ Add</button>
            </div>
          </div>

          <!-- Reminder list -->
          <div class="reminder-list" v-if="reminders.length > 0">
            <div class="reminder-card" v-for="r in reminders" :key="r.id" :class="{done: r.done}">
              <button class="reminder-check" :class="{checked: r.done}" @click="toggleReminder(r.id)">
                {{ r.done ? '✓' : '' }}
              </button>
              <div class="reminder-info">
                <div class="reminder-title">{{ r.title }}</div>
                <div class="reminder-meta" v-if="r.time">⏰ {{ r.time }}</div>
                <div class="reminder-meta" v-else>No time set</div>
              </div>
              <button class="reminder-delete" @click="deleteReminder(r.id)">✕</button>
            </div>
          </div>
          <div class="reminder-empty" v-else>
            No reminders yet. Add your first one above 🌸
          </div>
        </div>
      </div>
    </div>
  </template>
</div>

<script>
const { createApp, ref, computed, nextTick, onMounted } = Vue;

createApp({
  setup() {
    const API_BASE = 'http://localhost:8080/api';

    // Theme
    const darkMode = ref(false);

    // Auth
    const loggedIn = ref(false);
    const userName = ref('Friend');
    const authTab = ref('login');
    const authError = ref('');
    const loginForm = ref({ email: '', password: '' });
    const regForm = ref({ name: '', email: '', password: '' });

    function doLogin() {
      authError.value = '';
      if (!loginForm.value.email || !loginForm.value.password) { authError.value = 'Please fill in all fields.'; return; }
      // --- Replace with real API call: POST /api/auth/login ---
      // Simulated login for demo
      userName.value = loginForm.value.email.split('@')[0];
      loggedIn.value = true;
    }

    function doRegister() {
      authError.value = '';
      if (!regForm.value.name || !regForm.value.email || !regForm.value.password) { authError.value = 'Please fill in all fields.'; return; }
      if (regForm.value.password.length < 6) { authError.value = 'Password must be at least 6 characters.'; return; }
      // --- Replace with real API call: POST /api/auth/register ---
      userName.value = regForm.value.name;
      loggedIn.value = true;
    }

    function doLogout() {
      loggedIn.value = false;
      messages.value = [];
      loginForm.value = { email: '', password: '' };
    }

    // Navigation
    const view = ref('chat');
    const sidebarOpen = ref(false);

    // Chat
    const messages = ref([]);
    const inputText = ref('');
    const isTyping = ref(false);
    const messagesEl = ref(null);
    const inputEl = ref(null);
    let msgCounter = 0;

    const quickPrompts = [
      "How are you?", "Tell me a joke 😄", "What's the weather like?",
      "Remind me to take my pills", "I feel lonely today"
    ];

    function now() {
      return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    async function sendMessage() {
      const text = inputText.value.trim();
      if (!text || isTyping.value) return;
      inputText.value = '';
      if (inputEl.value) inputEl.value.style.height = 'auto';

      messages.value.push({ id: ++msgCounter, role: 'user', content: text, time: now() });
      await scrollBottom();

      isTyping.value = true;
      await scrollBottom();

      try {
        // Real API call
        const res = await fetch(`${API_BASE}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });
        const data = await res.json();
        isTyping.value = false;
        messages.value.push({ id: ++msgCounter, role: 'bot', content: data.response, time: now() });
      } catch {
        // Fallback demo responses when backend isn't running
        await new Promise(r => setTimeout(r, 1200 + Math.random() * 800));
        isTyping.value = false;
        const demos = [
          "That's so lovely to hear! Tell me more about your day.",
          "I'm always here for you. What's on your mind?",
          "You know, you just made me smile! 😊",
          "I understand. Would you like to talk more about that?",
          "Great idea! Let me help you with that."
        ];
        messages.value.push({ id: ++msgCounter, role: 'bot', content: demos[Math.floor(Math.random()*demos.length)], time: now() });
      }
      await scrollBottom();
    }

    function sendQuick(p) { inputText.value = p; sendMessage(); }

    async function scrollBottom() {
      await nextTick();
      if (messagesEl.value) messagesEl.value.scrollTop = messagesEl.value.scrollHeight;
    }

    function clearChat() { messages.value = []; }

    function autoResize(e) {
      e.target.style.height = 'auto';
      e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
    }

    // Reminders
    const reminders = ref([]);
    const newReminder = ref({ title: '', time: '' });
    let reminderCounter = 0;

    const pendingReminders = computed(() => reminders.value.filter(r => !r.done).length);

    function addReminder() {
      if (!newReminder.value.title.trim()) return;
      reminders.value.push({
        id: ++reminderCounter,
        title: newReminder.value.title.trim(),
        time: newReminder.value.time,
        done: false
      });
      newReminder.value = { title: '', time: '' };
      // --- Replace with real API: POST /api/reminders ---
    }

    function toggleReminder(id) {
      const r = reminders.value.find(x => x.id === id);
      if (r) r.done = !r.done;
      // --- Replace with real API: PUT /api/reminders/:id ---
    }

    function deleteReminder(id) {
      reminders.value = reminders.value.filter(x => x.id !== id);
      // --- Replace with real API: DELETE /api/reminders/:id ---
    }

    return {
      darkMode, loggedIn, userName, authTab, authError,
      loginForm, regForm, doLogin, doRegister, doLogout,
      view, sidebarOpen,
      messages, inputText, isTyping, messagesEl, inputEl,
      quickPrompts, sendMessage, sendQuick, clearChat, autoResize,
      reminders, newReminder, pendingReminders, addReminder, toggleReminder, deleteReminder
    };
  }
}).mount('#app');
</script>
</body>
</html>
