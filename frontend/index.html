<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elderly Companion Chatbot</title>
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <h1>Elderly Companion Chatbot</h1>
        <p>Friendly support, reminders, and daily conversation.</p>
      </header>

      <section class="status-card">
        <button id="statusBtn">Check backend status</button>
        <p id="statusText">Status: unknown</p>
      </section>

      <section class="chat-card">
        <div id="messages" class="messages" aria-live="polite"></div>
        <form id="chatForm" class="composer">
          <label for="messageInput" class="sr-only">Type a message</label>
          <input
            id="messageInput"
            name="message"
            type="text"
            placeholder="Type a message (e.g., hello, medicine reminder)"
            required
          />
          <button type="submit">Send</button>
        </form>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
